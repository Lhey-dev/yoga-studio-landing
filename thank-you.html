<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent — Serenity Flow Yoga</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .thank-you-page {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: var(--color-gray-bg);
    }
    .thank-you-card {
      max-width: 480px;
      background: var(--color-white);
      border-radius: var(--radius-lg);
      padding: 3rem 2rem;
      box-shadow: var(--shadow-md);
      border-top: 3px solid var(--color-gold);
    }
    .thank-you-card h1 {
      font-family: var(--font-display);
      font-size: 2rem;
      color: var(--color-black);
      margin-bottom: 1rem;
    }
    .thank-you-card p {
      color: var(--color-gray);
      margin-bottom: 2rem;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main class="thank-you-page">
    <div class="thank-you-card">
      <p class="section-eyebrow">Thank you</p>
      <h1>We received your message</h1>
      <p>We'll get back to you within 24 hours. Namaste.</p>
      <a href="index.html" class="btn btn-primary">Back to Home</a>
    </div>
  </main>
</body>
</html>
